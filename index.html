<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarVector - PNG to SVG Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>StarVector</h1>
      <p class="subtitle">Convert PNG images to scalable SVG vectors</p>
    </header>

    <main>
      <section class="upload-section">
        <div class="drop-zone" id="dropZone">
          <div class="drop-zone-content">
            <svg class="upload-icon" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 16V4m0 0L8 8m4-4l4 4"/>
              <path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/>
            </svg>
            <p class="drop-text">Drop PNG image here or click to browse</p>
            <p class="drop-hint">Supports PNG, JPG, WebP</p>
          </div>
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden>
        </div>
      </section>

      <section class="controls" id="controls" style="display:none">
        <div class="control-group">
          <label for="colors">Number of colors</label>
          <input type="range" id="colors" min="2" max="64" value="16">
          <span class="range-value" id="colorsValue">16</span>
        </div>
        <div class="control-group">
          <label for="simplify">Simplify paths</label>
          <input type="range" id="simplify" min="0" max="50" value="10">
          <span class="range-value" id="simplifyValue">10</span>
        </div>
        <button id="convertBtn" class="btn-primary">Convert to SVG</button>
      </section>

      <section class="preview-section" id="previewSection" style="display:none">
        <div class="panels">
          <div class="panel">
            <h3>Original</h3>
            <div class="image-container">
              <img id="originalImage" alt="Original image">
            </div>
          </div>
          <div class="panel">
            <h3>SVG Result</h3>
            <div class="image-container" id="svgContainer"></div>
          </div>
        </div>
        <div class="actions">
          <button id="downloadBtn" class="btn-primary">Download SVG</button>
          <button id="resetBtn" class="btn-secondary">Convert Another</button>
        </div>
      </section>
    </main>

    <footer>
      <p>Client-side PNG to SVG vectorization</p>
    </footer>
  </div>

  <script src="imagetracer.js"></script>
  <script src="script.js"></script>
</body>
</html>
